workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == 'main'

stages:
  - check
  - build
  - test
  - package
  - upload

variables:
  NEXUS_CI_GO_VERSION: "1.26.1"
  NEXUS_CI_DEBIAN_VERSION: "trixie"
  NEXUS_CI_DEFAULT_PYTHON_VER: "3.13"
  NEXUS_CI_RUST_VERSION: "1.94.0"
  NEXUS_CI_NODE_VERSION: "24"
  NEXUS_CI_NVM_VERSION: "0.40.4"
  NEXUS_CI_UV_VERSION: "0.9.28"
  NEXUS_CI_WASM_VERSION: "0.2.20"
  NEXUS_CI_WORKSPACE_TMP: "${CI_PROJECT_DIR}/.tmp"
  UV_CACHE_DIR: .uv-cache
  UV_INSTALL_DIR: /usr/local/bin
  UV_PYTHON_DOWNLOADS: never

default:
  cache:
    - key: $CI_COMMIT_REF_SLUG
      paths:
        - $UV_CACHE_DIR
  before_script:
    - mkdir -p ${NEXUS_CI_WORKSPACE_TMP}

.install_build_essential: &install_build_essential
    - echo "Installing build-essential"
    - apt-get update -qq && apt-get install -y --no-install-recommends build-essential

.install_nodejs: &install_nodejs
    - echo "Installing NodeJS"
    - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v${NEXUS_CI_NVM_VERSION}/install.sh | bash
    - \. "$HOME/.nvm/nvm.sh"
    - nvm install ${NEXUS_CI_NODE_VERSION}
    - echo "NodeJS and NPM versions:"
    - node --version && npm --version

.install_uv_and_python: &install_uv_and_python
    - echo "Installing uv"
    - curl -LsSf https://astral.sh/uv/${NEXUS_CI_UV_VERSION}/install.sh | sh
    - echo "Installing Python"
    - UV_PYTHON_DOWNLOADS=manual uv python install --managed-python ${NEXUS_CI_DEFAULT_PYTHON_VER}
    - export PYO3_PYTHON=$(uv python find --managed-python ${NEXUS_CI_DEFAULT_PYTHON_VER})

.setup_venv: &setup_venv
    - uv venv --python=${NEXUS_CI_DEFAULT_PYTHON_VER} --seed ${NEXUS_CI_WORKSPACE_TMP}/.venv
    - source ${NEXUS_CI_WORKSPACE_TMP}/.venv/bin/activate
    - uv sync --active --reinstall-package nvidia-nat-nexus

check:precommit:
  stage: check
  image:
    name: rust:${NEXUS_CI_RUST_VERSION}-${NEXUS_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  cache:
    - key:
        files:
          - .pre-commit-config.yaml
      paths:
        - ${CI_PROJECT_DIR}/.cache/pre-commit
  script:
    - echo "Installing Rust tools"
    - rustup component add rustfmt clippy
    - cargo fetch --locked
    - cargo install cargo-deny --locked
    - echo "Installing Go"
    - curl -LsSf https://go.dev/dl/go${NEXUS_CI_GO_VERSION}.linux-amd64.tar.gz | tar -C /usr/local -xzf -
    - export PATH=$PATH:/usr/local/go/bin
    - *install_uv_and_python
    - *setup_venv
    - echo "Running pre-commit"
    - |
      if [ -n "${CI_MERGE_REQUEST_DIFF_BASE_SHA}" ]; then
        echo "Running pre-commit on changed files between ${CI_MERGE_REQUEST_DIFF_BASE_SHA} and ${CI_COMMIT_SHA}"
        pre-commit run --show-diff-on-failure --from-ref "${CI_MERGE_REQUEST_DIFF_BASE_SHA}" --to-ref "${CI_COMMIT_SHA}"
      else
        echo "Warning: Base SHA not available, checking all files"
        pre-commit run --show-diff-on-failure --all-files
      fi
  after_script:
    - uv cache prune --ci

build:
  stage: build
  image:
    name: rust:${NEXUS_CI_RUST_VERSION}-${NEXUS_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  artifacts:
    name: "cargo-build"
    when: on_success
    paths:
      - target/
      - crates/wasm/pkg/
      - python/nat_nexus/*.so
  script:
    - *install_build_essential
    - *install_uv_and_python
    - echo "Building Nexus"
    - cargo build --release --workspace
    - cargo test --no-run --release --workspace
    - echo "Building Python Extension"
    - *setup_venv
    - echo "Building WASM package"
    - cargo install wasm-pack
    - wasm-pack build --release crates/wasm
  after_script:
    - uv cache prune --ci

# Test stages are listed  in alphabetical order
test:go_tests:
  stage: test
  timeout: 30 minutes
  image:
    name: golang:${NEXUS_CI_GO_VERSION}-${NEXUS_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: build
  artifacts:
    when: always
    reports:
      junit: go_junit_report.xml
      coverage_report:
        coverage_format: cobertura
        path: go_coverage_report.xml
  variables:
    CGO_LDFLAGS: "-L${CI_PROJECT_DIR}/target/release"
    LD_LIBRARY_PATH: "${CI_PROJECT_DIR}/target/release"
  script:
      - echo "Go Versions:"
      - go version
      - cd go/nat_nexus
      - echo "Installing Go test reporting tools"
      - go install github.com/jstemmer/go-junit-report/v2@latest
      - go install github.com/boumenot/gocover-cobertura@latest
      - echo "Running Go tests:"
      - go test -v -coverprofile=coverage.out ./... 2>&1
          | tee /dev/stderr
          | go-junit-report -set-exit-code > ${CI_PROJECT_DIR}/go_junit_report.xml
      - gocover-cobertura < coverage.out > ${CI_PROJECT_DIR}/go_coverage_report.xml

test:nodejs_tests:
  stage: test
  timeout: 30 minutes
  image:
    name: rust:${NEXUS_CI_RUST_VERSION}-${NEXUS_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: build
  artifacts:
    when: always
    reports:
      junit: nodejs_junit.xml
      coverage_report:
        coverage_format: cobertura
        path: cobertura-coverage.xml
  script:
    - *install_nodejs
    - echo "Installing test dependencies"
    - cd crates/node && npm install && npm install -g c8 && npm run build && cd ../..
    - echo "Running NodeJS tests"
    - c8 --reporter=cobertura --reports-dir=${CI_PROJECT_DIR}
        node --test
        --test-reporter=spec --test-reporter-destination=stdout
        --test-reporter=junit --test-reporter-destination=${CI_PROJECT_DIR}/nodejs_junit.xml
        crates/node/tests/*.mjs

test:python_tests:
  stage: test
  timeout: 30 minutes
  image:
    name: ghcr.io/astral-sh/uv:${NEXUS_CI_UV_VERSION}-python${NEXUS_CI_DEFAULT_PYTHON_VER}-${NEXUS_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: build
  coverage: /TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
  artifacts:
    when: always
    reports:
      junit: pytest_junit_report*.xml
      coverage_report:
        coverage_format: cobertura  # or jacoco
        path: pytest_coverage_report*.xml
  after_script:
    - uv cache prune --ci
  script:
    - echo "Creating UV environment"
    - *setup_venv
    - echo "Running Python tests"
    - pytest
        --cov=nat_nexus --cov-report term-missing
        --junit-xml=${CI_PROJECT_DIR}/pytest_junit_report.xml
        --cov-report xml:${CI_PROJECT_DIR}/pytest_coverage_report.xml

test:rust_tests:
  stage: test
  timeout: 30 minutes
  image:
    name: rust:${NEXUS_CI_RUST_VERSION}-${NEXUS_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: build
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/rust_junit_report.xml
  script:
    - *install_build_essential
    - *install_uv_and_python
    - echo "Installing cargo-nextest"
    - cargo install cargo-nextest --locked
    - echo "Running Rust tests"
    - cargo nextest run --workspace --release --profile ci

test:wasm_tests:
  stage: test
  timeout: 30 minutes
  image:
    name: rust:${NEXUS_CI_RUST_VERSION}-${NEXUS_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: build
  script:
    - *install_nodejs
    - echo "Installing wasm-pack"
    - cargo install wasm-pack
    - echo "Running WASM tests"
    - wasm-pack test --release --node crates/wasm

package:wheel:x86_64:
  stage: package
  image:
    name: rust:${NEXUS_CI_RUST_VERSION}-${NEXUS_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: build
  artifacts:
    name: "wheel-x86_64"
    when: on_success
    paths:
      - ${NEXUS_CI_WORKSPACE_TMP}/wheels/
  script:
    - *install_build_essential
    - *install_uv_and_python
    - *setup_venv
    - |
      if [ -z "${CI_COMMIT_TAG}" ]; then
        echo "Non-release build: appending commit hash to version"
        if ! sed -i "s/^version = \"\(.*\)\"/version = \"\1+${CI_COMMIT_SHORT_SHA}\"/" Cargo.toml; then
          echo "Error: Failed to modify version in Cargo.toml"
          exit 1
        fi
        # Verify the modification succeeded
        if ! grep -q "version = \".*+${CI_COMMIT_SHORT_SHA}\"" Cargo.toml; then
          echo "Error: Version modification did not apply correctly"
          exit 1
        fi
      else
        echo "Tagged release ${CI_COMMIT_TAG}: using version as-is"
      fi
    - echo "Building x86_64 wheel"
    - maturin build --release --target x86_64-unknown-linux-gnu --out ${NEXUS_CI_WORKSPACE_TMP}/wheels
    - |
      if [ ! -d ${NEXUS_CI_WORKSPACE_TMP}/wheels ] || [ -z "$(ls -A ${NEXUS_CI_WORKSPACE_TMP}/wheels/*.whl 2>/dev/null)" ]; then
        echo "Error: No wheels found in ${NEXUS_CI_WORKSPACE_TMP}/wheels/"
        exit 1
      fi
    - echo "Uploading wheel to GitLab package registry"
    - |
      set -e
      UV_PUBLISH_USERNAME=gitlab-ci-token \
      UV_PUBLISH_PASSWORD="${CI_JOB_TOKEN}" \
      UV_PUBLISH_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi" \
      uv publish --no-progress ${NEXUS_CI_WORKSPACE_TMP}/wheels/*.whl
  after_script:
    - uv cache prune --ci

upload:artifactory:
  stage: upload
  image:
    name: ghcr.io/astral-sh/uv:${NEXUS_CI_UV_VERSION}-${NEXUS_CI_DEBIAN_VERSION}-slim
    pull_policy: if-not-present
  needs:
    - job: package:wheel:x86_64
      artifacts: true
  script:
    - |
      if [[ -z "${NEXUS_CI_ARTIFACTORY_USER}" || -z "${NEXUS_CI_ARTIFACTORY_KEY}" || -z "${NEXUS_CI_ARTIFACTORY_URL}" ]]; then
          echo "Error: uploading to artifactory requires the following environment variables: NEXUS_CI_ARTIFACTORY_USER, NEXUS_CI_ARTIFACTORY_KEY, NEXUS_CI_ARTIFACTORY_URL."
          exit 1
      fi
    - |
      if [ ! -d ${NEXUS_CI_WORKSPACE_TMP}/wheels ] || [ -z "$(ls -A ${NEXUS_CI_WORKSPACE_TMP}/wheels/*.whl 2>/dev/null)" ]; then
        echo "Error: No wheels found in ${NEXUS_CI_WORKSPACE_TMP}/wheels/"
        exit 1
      fi
    - echo "Uploading wheels to Artifactory"
    - |
      set -e
      UV_PUBLISH_USERNAME="${NEXUS_CI_ARTIFACTORY_USER}" \
      UV_PUBLISH_PASSWORD="${NEXUS_CI_ARTIFACTORY_KEY}" \
      UV_PUBLISH_URL="${NEXUS_CI_ARTIFACTORY_URL}" \
      uv publish --no-progress ${NEXUS_CI_WORKSPACE_TMP}/wheels/*.whl
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == 'main'
