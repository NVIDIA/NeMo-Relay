# Configure the GitLab pipeline schedule with cron `12 9 * * *`.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'schedule'
    - when: never

stages:
  - check
  - collect
  - publish

variables:
  NEMO_FLOW_CI_DEBIAN_VERSION: "trixie"
  NEMO_FLOW_CI_NODE_VERSION: "24"
  NEMO_FLOW_CI_UV_VERSION: "0.9.28"
  NEMO_FLOW_CI_GITHUB_REPOSITORY: "NVIDIA/NeMo-Flow"
  NEMO_FLOW_CI_GITHUB_WORKFLOW_FILE: "ci.yaml"
  NEMO_FLOW_CI_GITHUB_BRANCH: "main"
  NEMO_FLOW_CI_GITHUB_RUN_WAIT_SECONDS: "7200"
  NEMO_FLOW_CI_GITHUB_RUN_POLL_SECONDS: "60"

check:sonar:
  stage: check
  image:
    name: sonarsource/sonar-scanner-cli:latest
    pull_policy: if-not-present
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  allow_failure: true

collect:github-artifacts:
  stage: collect
  image:
    name: alpine:3.22
    pull_policy: if-not-present
  before_script:
    - apk add --no-cache findutils github-cli unzip
  script:
    - |
      set -eu

      if [ -z "${NEMO_FLOW_CI_GITHUB_TOKEN:-}" ]; then
        echo "Error: NEMO_FLOW_CI_GITHUB_TOKEN is required to download GitHub Actions artifacts." >&2
        exit 1
      fi
      export GH_TOKEN="${NEMO_FLOW_CI_GITHUB_TOKEN}"

      mkdir -p collected/wheels collected/wasm collected/node downloaded

      run_id="$(
        gh run list \
          --repo "$NEMO_FLOW_CI_GITHUB_REPOSITORY" \
          --workflow "$NEMO_FLOW_CI_GITHUB_WORKFLOW_FILE" \
          --event schedule \
          --branch "$NEMO_FLOW_CI_GITHUB_BRANCH" \
          --limit 1 \
          --json databaseId \
          --jq '.[0].databaseId // ""'
      )"
      if [ -z "$run_id" ]; then
        echo "Error: no scheduled GitHub Actions run found for ${NEMO_FLOW_CI_GITHUB_REPOSITORY}/${NEMO_FLOW_CI_GITHUB_WORKFLOW_FILE} on ${NEMO_FLOW_CI_GITHUB_BRANCH}." >&2
        exit 1
      fi

      elapsed_seconds=0
      while :; do
        run_state="$(
          gh run view "$run_id" \
            --repo "$NEMO_FLOW_CI_GITHUB_REPOSITORY" \
            --json status,conclusion,url \
            --jq '[.status, (.conclusion // ""), .url] | @tsv'
        )"
        run_status="$(printf '%s\n' "$run_state" | cut -f 1)"
        run_conclusion="$(printf '%s\n' "$run_state" | cut -f 2)"
        run_html_url="$(printf '%s\n' "$run_state" | cut -f 3)"

        if [ "$run_status" = "completed" ]; then
          break
        fi
        if [ "$elapsed_seconds" -ge "$NEMO_FLOW_CI_GITHUB_RUN_WAIT_SECONDS" ]; then
          echo "Error: scheduled GitHub Actions run ${run_id} did not complete within ${NEMO_FLOW_CI_GITHUB_RUN_WAIT_SECONDS} seconds: ${run_html_url}" >&2
          exit 1
        fi

        echo "Waiting for scheduled GitHub Actions run ${run_id}: ${run_html_url}"
        sleep "$NEMO_FLOW_CI_GITHUB_RUN_POLL_SECONDS"
        elapsed_seconds=$((elapsed_seconds + NEMO_FLOW_CI_GITHUB_RUN_POLL_SECONDS))
      done

      if [ "$run_conclusion" != "success" ]; then
        echo "Error: scheduled GitHub Actions run ${run_id} concluded ${run_conclusion}: ${run_html_url}" >&2
        exit 1
      fi

      gh run download "$run_id" --repo "$NEMO_FLOW_CI_GITHUB_REPOSITORY" --pattern 'wheel-*' --dir downloaded/wheels
      gh run download "$run_id" --repo "$NEMO_FLOW_CI_GITHUB_REPOSITORY" --name wasm-bundler --dir downloaded/wasm
      gh run download "$run_id" --repo "$NEMO_FLOW_CI_GITHUB_REPOSITORY" --name npm-consolidated --dir downloaded/node

      find downloaded/wheels -type f -name '*.whl' -exec cp {} collected/wheels/ \;
      find downloaded/wasm -type f -name '*.tgz' -exec cp {} collected/wasm/ \;
      node_zip="$(find downloaded/node -type f -name consolidated.zip -print -quit)"
      if [ -z "$node_zip" ]; then
        echo "Error: collected GitHub npm-consolidated artifact did not contain consolidated.zip." >&2
        exit 1
      fi
      cp "$node_zip" collected/node/consolidated.zip

      if ! ls collected/wheels/*.whl >/dev/null 2>&1; then
        echo "Error: collected GitHub wheel artifacts did not contain any .whl files." >&2
        exit 1
      fi
      if ! ls collected/wasm/*.tgz >/dev/null 2>&1; then
        echo "Error: collected GitHub WASM artifact did not contain any .tgz files." >&2
        exit 1
      fi
      if [ ! -f collected/node/consolidated.zip ]; then
        echo "Error: collected GitHub npm-consolidated artifact did not contain consolidated.zip." >&2
        exit 1
      fi

      {
        printf '{\n'
        printf '  "run_id": "%s",\n' "$run_id"
        printf '  "run_url": "%s",\n' "$run_html_url"
        printf '  "workflow": "%s",\n' "$NEMO_FLOW_CI_GITHUB_WORKFLOW_FILE"
        printf '  "branch": "%s"\n' "$NEMO_FLOW_CI_GITHUB_BRANCH"
        printf '}\n'
      } > collected/github-run.json
  artifacts:
    name: github-scheduled-package-artifacts
    when: on_success
    expire_in: 7 days
    paths:
      - collected/wheels/*.whl
      - collected/wasm/*.tgz
      - collected/node/consolidated.zip
      - collected/github-run.json

publish:artifactory:wheels:
  stage: publish
  image:
    name: ghcr.io/astral-sh/uv:${NEMO_FLOW_CI_UV_VERSION}-${NEMO_FLOW_CI_DEBIAN_VERSION}-slim
    pull_policy: if-not-present
  needs:
    - job: collect:github-artifacts
      artifacts: true
  script:
    - |
      set -eu

      if [ -z "${NEMO_FLOW_CI_ARTIFACTORY_USER:-}" ] || [ -z "${NEMO_FLOW_CI_ARTIFACTORY_KEY:-}" ] || [ -z "${NEMO_FLOW_CI_ARTIFACTORY_PYPI_URL:-}" ]; then
        echo "Error: uploading wheels to Artifactory requires NEMO_FLOW_CI_ARTIFACTORY_USER, NEMO_FLOW_CI_ARTIFACTORY_KEY, and NEMO_FLOW_CI_ARTIFACTORY_PYPI_URL." >&2
        exit 1
      fi
      if ! ls collected/wheels/*.whl >/dev/null 2>&1; then
        echo "Error: no collected wheel artifacts found." >&2
        exit 1
      fi

      UV_PUBLISH_USERNAME="${NEMO_FLOW_CI_ARTIFACTORY_USER}" \
        UV_PUBLISH_PASSWORD="${NEMO_FLOW_CI_ARTIFACTORY_KEY}" \
        UV_PUBLISH_URL="${NEMO_FLOW_CI_ARTIFACTORY_PYPI_URL}" \
        uv publish --no-progress collected/wheels/*.whl

publish:artifactory:npm:
  stage: publish
  image:
    name: node:${NEMO_FLOW_CI_NODE_VERSION}-${NEMO_FLOW_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: collect:github-artifacts
      artifacts: true
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends unzip ca-certificates && rm -rf /var/lib/apt/lists/*
  script:
    - |
      set -eu

      if [ -z "${NEMO_FLOW_CI_ARTIFACTORY_USER:-}" ] || [ -z "${NEMO_FLOW_CI_ARTIFACTORY_KEY:-}" ] || [ -z "${NEMO_FLOW_CI_ARTIFACTORY_NPM_URL:-}" ]; then
        echo "Error: uploading npm packages to Artifactory requires NEMO_FLOW_CI_ARTIFACTORY_USER, NEMO_FLOW_CI_ARTIFACTORY_KEY, and NEMO_FLOW_CI_ARTIFACTORY_NPM_URL." >&2
        exit 1
      fi
      if [ ! -f collected/node/consolidated.zip ]; then
        echo "Error: no collected consolidated Node package artifact found." >&2
        exit 1
      fi
      if ! ls collected/wasm/*.tgz >/dev/null 2>&1; then
        echo "Error: no collected WASM package artifacts found." >&2
        exit 1
      fi

      mkdir -p collected/node/consolidated
      unzip -q collected/node/consolidated.zip -d collected/node/consolidated
      if [ ! -d collected/node/consolidated/package ]; then
        echo "Error: consolidated Node artifact did not contain a package directory." >&2
        exit 1
      fi

      registry_url="${NEMO_FLOW_CI_ARTIFACTORY_NPM_URL%/}/"
      registry_key="${registry_url#https:}"
      npm_auth="$(printf '%s:%s' "${NEMO_FLOW_CI_ARTIFACTORY_USER}" "${NEMO_FLOW_CI_ARTIFACTORY_KEY}" | base64 | tr -d '\n')"
      npm config set registry "$registry_url"
      npm config set "${registry_key}:_auth" "$npm_auth"
      npm config set "${registry_key}:email" "ci@nvidia.com"
      npm config set "${registry_key}:always-auth" "true"

      npm publish --tag dev collected/node/consolidated/package
      for package_path in collected/wasm/*.tgz; do
        npm publish --tag dev "$package_path"
      done
