workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == 'main'

stages:
  - check
  - build
  - test
  - report
  - package
  - publish

variables:
  NEMO_FLOW_CI_GO_VERSION: "1.26.1"
  NEMO_FLOW_CI_DEBIAN_VERSION: "trixie"
  NEMO_FLOW_CI_DEFAULT_PYTHON_VER: "3.13"
  NEMO_FLOW_CI_RUST_VERSION: "1.94.0"
  NEMO_FLOW_CI_NODE_VERSION: "24"
  NEMO_FLOW_CI_NVM_VERSION: "0.40.4"
  NEMO_FLOW_CI_UV_VERSION: "0.9.28"
  NEMO_FLOW_CI_WASM_VERSION: "0.2.20"
  NEMO_FLOW_CI_RUST_ONLY_EXCLUDES: "--exclude nemo-flow-node --exclude nemo-flow-python --exclude nemo-flow-wasm"
  NEMO_FLOW_CI_WORKSPACE_TMP: "${CI_PROJECT_DIR}/.tmp"
  UV_CACHE_DIR: .uv-cache
  UV_INSTALL_DIR: /usr/local/bin
  UV_PYTHON_DOWNLOADS: never

default:
  cache:
    - key: $CI_COMMIT_REF_SLUG
      paths:
        - $UV_CACHE_DIR
  before_script:
    - mkdir -p ${NEMO_FLOW_CI_WORKSPACE_TMP}

.install_build_essential: &install_build_essential
    - echo "Installing build-essential"
    - apt-get update -qq && apt-get install -y --no-install-recommends build-essential

.install_nodejs: &install_nodejs
    - echo "Installing NodeJS"
    - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v${NEMO_FLOW_CI_NVM_VERSION}/install.sh | bash
    - \. "$HOME/.nvm/nvm.sh"
    - nvm install ${NEMO_FLOW_CI_NODE_VERSION}
    - echo "NodeJS and NPM versions:"
    - node --version && npm --version

.install_uv_and_python: &install_uv_and_python
    - echo "Installing uv"
    - curl -LsSf https://astral.sh/uv/${NEMO_FLOW_CI_UV_VERSION}/install.sh | sh
    - echo "Installing Python"
    - UV_PYTHON_DOWNLOADS=manual uv python install --managed-python ${NEMO_FLOW_CI_DEFAULT_PYTHON_VER}
    - export PYO3_PYTHON=$(uv python find --managed-python ${NEMO_FLOW_CI_DEFAULT_PYTHON_VER})

.export_managed_python_runtime: &export_managed_python_runtime
    - |
      export PYO3_PYTHON="$(uv python find --managed-python ${NEMO_FLOW_CI_DEFAULT_PYTHON_VER})"
      eval "$("$PYO3_PYTHON" - <<'PY'
      import shlex
      import sys
      import sysconfig

      def emit(name, value):
          print(f"export {name}={shlex.quote(value or '')}")

      emit("PYTHONHOME", sys.base_prefix)
      emit("PYTHON_STDLIB", sysconfig.get_path("stdlib"))
      emit("PYTHON_PLATSTDLIB", sysconfig.get_path("platstdlib"))
      emit("PYTHON_LIBDIR", sysconfig.get_config_var("LIBDIR"))
      PY
      )"
      export PYTHONPATH="${PYTHON_STDLIB}:${PYTHON_PLATSTDLIB}"
      if [ -n "${PYTHON_LIBDIR}" ]; then
        export LD_LIBRARY_PATH="${PYTHON_LIBDIR}${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
      fi

.install_go: &install_go
    - echo "Installing Go"
    - curl -LsSf https://go.dev/dl/go${NEMO_FLOW_CI_GO_VERSION}.linux-amd64.tar.gz | tar -C /usr/local -xzf -
    - export PATH=$PATH:/usr/local/go/bin

.setup_venv: &setup_venv
    - uv venv --python=${NEMO_FLOW_CI_DEFAULT_PYTHON_VER} --seed ${NEMO_FLOW_CI_WORKSPACE_TMP}/.venv
    - source ${NEMO_FLOW_CI_WORKSPACE_TMP}/.venv/bin/activate
    - uv sync --active --reinstall-package nemo-flow

check:precommit:
  stage: check
  image:
    name: rust:${NEMO_FLOW_CI_RUST_VERSION}-${NEMO_FLOW_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  cache:
    - key:
        files:
          - .pre-commit-config.yaml
      paths:
        - ${CI_PROJECT_DIR}/.cache/pre-commit
  script:
    - echo "Installing Rust tools"
    - rustup component add rustfmt clippy
    - cargo fetch --locked
    - cargo install cargo-deny --locked
    - *install_go
    - *install_uv_and_python
    - *setup_venv
    - echo "Running pre-commit"
    - |
      if [ -n "${CI_MERGE_REQUEST_DIFF_BASE_SHA}" ]; then
        echo "Running pre-commit on changed files between ${CI_MERGE_REQUEST_DIFF_BASE_SHA} and ${CI_COMMIT_SHA}"
        pre-commit run --show-diff-on-failure --from-ref "${CI_MERGE_REQUEST_DIFF_BASE_SHA}" --to-ref "${CI_COMMIT_SHA}"
      else
        echo "Warning: Base SHA not available, checking all files"
        pre-commit run --show-diff-on-failure --all-files
      fi
  after_script:
    - uv cache prune --ci

build:
  stage: build
  image:
    name: rust:${NEMO_FLOW_CI_RUST_VERSION}-${NEMO_FLOW_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  artifacts:
    name: "cargo-build"
    when: on_success
    paths:
      - target/
      - crates/node/*.node
      - crates/node/index.js
      - crates/node/index.d.ts
      - crates/wasm/pkg/
      - python/nemo_flow/*.so
  script:
    - *install_build_essential
    - *install_nodejs
    - *install_uv_and_python
    - echo "Building NeMo Flow"
    - cargo build --release --workspace
    - cargo test --no-run --release --workspace ${NEMO_FLOW_CI_RUST_ONLY_EXCLUDES}
    - echo "Building Python Extension"
    - *setup_venv
    - echo "Building NodeJS package"
    - pushd crates/node && npm install && npm run build && popd
    - echo "Building WASM package"
    - cargo install wasm-pack
    - wasm-pack build --release crates/wasm --scope nvidia
  after_script:
    - uv cache prune --ci

# Test stages are listed in alphabetical order
test:go:
  stage: test
  timeout: 30 minutes
  image:
    name: golang:${NEMO_FLOW_CI_GO_VERSION}-${NEMO_FLOW_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: build
  artifacts:
    when: always
    reports:
      junit: go_junit_report.xml
      coverage_report:
        coverage_format: cobertura
        path: target/coverage/go_coverage_report.xml
    paths:
      - target/coverage/go_coverage_report.xml
  variables:
    CGO_LDFLAGS: "-L${CI_PROJECT_DIR}/target/release"
    LD_LIBRARY_PATH: "${CI_PROJECT_DIR}/target/release"
  script:
      - echo "Go Versions:"
      - go version
      - cd go/nemo_flow
      - echo "Installing Go test reporting tools"
      - go install github.com/jstemmer/go-junit-report/v2@latest
      - go install github.com/boumenot/gocover-cobertura@latest
      - echo "Running Go tests:"
      - mkdir -p ${CI_PROJECT_DIR}/target/coverage
      - go test -v -coverprofile=coverage.out ./... 2>&1
          | tee /dev/stderr
          | go-junit-report -set-exit-code > ${CI_PROJECT_DIR}/go_junit_report.xml
      - gocover-cobertura < coverage.out > ${CI_PROJECT_DIR}/target/coverage/go_coverage_report.xml

test:node:
  stage: test
  timeout: 30 minutes
  image:
    name: rust:${NEMO_FLOW_CI_RUST_VERSION}-${NEMO_FLOW_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: build
  artifacts:
    when: always
    reports:
      junit: target/coverage/nodejs_junit.xml
      coverage_report:
        coverage_format: cobertura
        path: target/coverage/cobertura-coverage.xml
    paths:
      - target/coverage/cobertura-coverage.xml
      - target/coverage/coverage-summary.json
      - target/coverage/node-rust.xml
  script:
    - *install_build_essential
    - *install_nodejs
    - cargo install cargo-llvm-cov --locked
    - mkdir -p target/coverage
    - eval "$(cargo llvm-cov show-env --sh)"
    - cargo llvm-cov clean --workspace
    - cargo test -p nemo-flow-node --lib
    - echo "Running NodeJS tests and coverage"
    - |
      pushd crates/node
      npm install
      npm install -g c8
      npm run build-debug
      c8 --reporter=cobertura --reporter=json-summary --reports-dir="${CI_PROJECT_DIR}/target/coverage" \
        node --test \
          --test-force-exit \
          --test-reporter=spec --test-reporter-destination=stdout \
          --test-reporter=junit --test-reporter-destination="${CI_PROJECT_DIR}/target/coverage/nodejs_junit.xml" \
          tests/*.mjs
      popd
    - cargo llvm-cov report -p nemo-flow-node --ignore-filename-regex '.*/src/.*_tests\.rs$' --cobertura --output-path target/coverage/node-rust.xml

test:python:
  stage: test
  timeout: 30 minutes
  image:
    name: rust:${NEMO_FLOW_CI_RUST_VERSION}-${NEMO_FLOW_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: build
  artifacts:
    when: always
    reports:
      junit: target/coverage/pytest_junit_report.xml
      coverage_report:
        coverage_format: cobertura
        path: target/coverage/pytest_coverage_report.xml
    paths:
      - target/coverage/pytest_coverage_report.xml
      - target/coverage/python-rust.xml
  after_script:
    - uv cache prune --ci
  script:
    - *install_build_essential
    - *install_uv_and_python
    - *export_managed_python_runtime
    - cargo install cargo-llvm-cov --locked
    - mkdir -p target/coverage
    - |
      set -e
      eval "$(cargo llvm-cov show-env --sh)"
      cargo llvm-cov clean --workspace
      cargo test -p nemo-flow-python --lib
      uv venv --python=${NEMO_FLOW_CI_DEFAULT_PYTHON_VER} --seed ${NEMO_FLOW_CI_WORKSPACE_TMP}/.venv
      source ${NEMO_FLOW_CI_WORKSPACE_TMP}/.venv/bin/activate
      uv sync --active --reinstall-package nemo-flow
      uv run maturin develop
      uv run pytest python/tests \
        --cov=nemo_flow --cov-report term-missing \
        --junit-xml=${CI_PROJECT_DIR}/target/coverage/pytest_junit_report.xml \
        --cov-report xml:${CI_PROJECT_DIR}/target/coverage/pytest_coverage_report.xml
      cargo llvm-cov report -p nemo-flow-python --ignore-filename-regex '.*/src/.*_tests\.rs$' --cobertura --output-path target/coverage/python-rust.xml

test:rust:
  stage: test
  timeout: 30 minutes
  image:
    name: rust:${NEMO_FLOW_CI_RUST_VERSION}-${NEMO_FLOW_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: build
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/rust_junit_report.xml
      coverage_report:
        coverage_format: cobertura
        path: target/coverage/rust-workspace.xml
    paths:
      - target/coverage/rust-workspace.xml
  script:
    - *install_build_essential
    - echo "Installing cargo-nextest"
    - cargo install cargo-nextest --locked
    - cargo install cargo-llvm-cov --locked
    - mkdir -p target/coverage
    - eval "$(cargo llvm-cov show-env --sh)"
    - cargo llvm-cov clean --workspace
    - cargo nextest run --workspace ${NEMO_FLOW_CI_RUST_ONLY_EXCLUDES} --release --profile ci
    - cargo llvm-cov report --release --ignore-filename-regex '(.*/crates/(node|python|wasm)/.*|.*/src/(coverage_tests|.*_tests)\.rs$)' --cobertura --output-path target/coverage/rust-workspace.xml

test:wasm:
  stage: test
  timeout: 30 minutes
  image:
    name: rust:${NEMO_FLOW_CI_RUST_VERSION}-${NEMO_FLOW_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: build
  artifacts:
    when: always
    reports:
      junit: target/coverage/wasm_junit.xml
      coverage_report:
        coverage_format: cobertura
        path: target/coverage/wasm-js.xml
    paths:
      - target/coverage/wasm-rust.xml
      - target/coverage/wasm-js.xml
  script:
    - *install_nodejs
    - echo "Installing wasm-pack"
    - cargo install wasm-pack
    - echo "Installing cargo-llvm-cov"
    - cargo install cargo-llvm-cov --locked
    - mkdir -p target/coverage
    - echo "Running native WASM crate unit tests with Rust coverage"
    - |
      (
        eval "$(cargo llvm-cov show-env --sh)"
        cargo llvm-cov clean --workspace
        cargo test -p nemo-flow-wasm --lib --release
        cargo llvm-cov report -p nemo-flow-wasm --release \
          --ignore-filename-regex '.*/src/.*_tests\.rs$' \
          --cobertura --output-path target/coverage/wasm-rust.xml
      )
    - echo "Running WASM behavior tests"
    - wasm-pack test --release --node crates/wasm
    - echo "Building WASM Node package for coverage"
    - wasm-pack build --release crates/wasm --target nodejs --out-dir pkg-test
    - echo "Running WASM Node coverage harness"
    - |
      npx --yes c8 \
        --include="crates/wasm/pkg-test/**/*.js" \
        --exclude="crates/wasm/tests-js/**" \
        --reporter=cobertura \
        --reports-dir="${CI_PROJECT_DIR}/target/coverage/wasm-c8" \
        node --test \
          --test-force-exit \
          --test-reporter=spec --test-reporter-destination=stdout \
          --test-reporter=junit --test-reporter-destination="${CI_PROJECT_DIR}/target/coverage/wasm_junit.xml" \
          crates/wasm/tests-js/*.mjs
      mv "${CI_PROJECT_DIR}/target/coverage/wasm-c8/cobertura-coverage.xml" \
        "${CI_PROJECT_DIR}/target/coverage/wasm-js.xml"

coverage:aggregate:
  stage: report
  image:
    name: python:${NEMO_FLOW_CI_DEFAULT_PYTHON_VER}-slim
    pull_policy: if-not-present
  needs:
    - job: test:go
      artifacts: true
    - job: test:node
      artifacts: true
    - job: test:python
      artifacts: true
    - job: test:rust
      artifacts: true
    - job: test:wasm
      artifacts: true
  coverage: /TOTAL (\d+(?:\.\d+)?)%/
  artifacts:
    when: always
    paths:
      - target/coverage/project-coverage-summary.md
  script:
    - python3 scripts/aggregate_coverage.py target/coverage

package:nodejs:x86_64:
  stage: package
  image:
    name: node:${NEMO_FLOW_CI_NODE_VERSION}-${NEMO_FLOW_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: build
      artifacts: true
  artifacts:
    name: "nodejs-x86_64"
    when: on_success
    paths:
      - ${NEMO_FLOW_CI_WORKSPACE_TMP}/npm/*.tgz
  script:
    - |
      set -e
      if [ -z "${CI_COMMIT_TAG}" ]; then
        echo "Non-release build: appending commit hash to version"
        NPM_PUBLISH_ARGS="--tag dev"
        node -e "
          try {
            const fs = require('fs');
            const sha = process.env.CI_COMMIT_SHORT_SHA;

            const pkgPath = 'crates/node/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            if (!pkg.version) {
              console.error('Error: package.json missing version field');
              process.exit(1);
            }
            pkg.version = pkg.version + '-' + sha;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
            console.log('package.json version updated to ' + pkg.version);

            const lockPath = 'crates/node/package-lock.json';
            const lock = JSON.parse(fs.readFileSync(lockPath, 'utf8'));
            if (!lock.version) {
              console.error('Error: package-lock.json missing version field');
              process.exit(1);
            }
            lock.version = lock.version + '-' + sha;
            if (lock.packages && lock.packages['']) {
              lock.packages[''].version = lock.packages[''].version + '-' + sha;
            }
            fs.writeFileSync(lockPath, JSON.stringify(lock, null, 2) + '\n');
            console.log('package-lock.json version updated to ' + lock.version);
          } catch (err) {
            console.error('Error updating version in package.json or package-lock.json:', err);
            process.exit(1);
          }
        "
      else
        echo "Tagged release ${CI_COMMIT_TAG}: using version as-is"
        NPM_PUBLISH_ARGS=""
      fi
      echo "Packing x86_64 npm package"
      mkdir -p ${NEMO_FLOW_CI_WORKSPACE_TMP}/npm
      pushd crates/node
      npm pack --pack-destination ${NEMO_FLOW_CI_WORKSPACE_TMP}/npm
      popd
      echo "Publishing npm package to GitLab package registry"
      REGISTRY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"
      REGISTRY_KEY="${REGISTRY_URL#https:}"
      npm config set "@nvidia:registry" "${REGISTRY_URL}"
      npm config set "${REGISTRY_KEY}:_authToken" "${CI_JOB_TOKEN}"
      npm publish ${NPM_PUBLISH_ARGS} ${NEMO_FLOW_CI_WORKSPACE_TMP}/npm/*.tgz

package:wasm:bundler:
  stage: package
  image:
    name: node:${NEMO_FLOW_CI_NODE_VERSION}-${NEMO_FLOW_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: build
      artifacts: true
  artifacts:
    name: "wasm-bundler"
    when: on_success
    paths:
      - ${NEMO_FLOW_CI_WORKSPACE_TMP}/wasm/*.tgz
  script:
    - |
      set -e
      if [ -z "${CI_COMMIT_TAG}" ]; then
        echo "Non-release build: appending commit hash to version"
        NPM_PUBLISH_ARGS="--tag dev"
        node -e "
          try {
            const fs = require('fs');
            const sha = process.env.CI_COMMIT_SHORT_SHA;

            const pkgPath = 'crates/wasm/pkg/package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            if (!pkg.version) {
              console.error('Error: package.json missing version field');
              process.exit(1);
            }
            pkg.version = pkg.version + '-' + sha;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
            console.log('crates/wasm/pkg/package.json version updated to ' + pkg.version);
          } catch (err) {
            console.error('Error updating version in crates/wasm/pkg/package.json:', err);
            process.exit(1);
          }
        "
      else
        echo "Tagged release ${CI_COMMIT_TAG}: using version as-is"
        NPM_PUBLISH_ARGS=""
      fi
      echo "Packing x86_64 wasm package"
      mkdir -p ${NEMO_FLOW_CI_WORKSPACE_TMP}/wasm
      pushd crates/wasm/pkg
      npm pack --pack-destination ${NEMO_FLOW_CI_WORKSPACE_TMP}/wasm
      popd
      echo "Publishing wasm package to GitLab package registry"
      REGISTRY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"
      REGISTRY_KEY="${REGISTRY_URL#https:}"
      npm config set "@nvidia:registry" "${REGISTRY_URL}"
      npm config set "${REGISTRY_KEY}:_authToken" "${CI_JOB_TOKEN}"
      npm publish ${NPM_PUBLISH_ARGS} ${NEMO_FLOW_CI_WORKSPACE_TMP}/wasm/*.tgz

package:wheel:x86_64:
  stage: package
  image:
    name: rust:${NEMO_FLOW_CI_RUST_VERSION}-${NEMO_FLOW_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: build
  artifacts:
    name: "wheel-x86_64"
    when: on_success
    paths:
      - ${NEMO_FLOW_CI_WORKSPACE_TMP}/wheels/
  script:
    - *install_build_essential
    - *install_uv_and_python
    - *setup_venv
    - |
      if [ -z "${CI_COMMIT_TAG}" ]; then
        echo "Non-release build: appending commit hash to version"
        if ! sed -i "s/^version = \"\(.*\)\"/version = \"\1+${CI_COMMIT_SHORT_SHA}\"/" Cargo.toml; then
          echo "Error: Failed to modify version in Cargo.toml"
          exit 1
        fi
        # Verify the modification succeeded
        if ! grep -q "version = \".*+${CI_COMMIT_SHORT_SHA}\"" Cargo.toml; then
          echo "Error: Version modification did not apply correctly"
          exit 1
        fi
      else
        echo "Tagged release ${CI_COMMIT_TAG}: using version as-is"
      fi
    - echo "Building x86_64 wheel"
    - maturin build --release --target x86_64-unknown-linux-gnu --out ${NEMO_FLOW_CI_WORKSPACE_TMP}/wheels
    - |
      if [ ! -d ${NEMO_FLOW_CI_WORKSPACE_TMP}/wheels ] || [ -z "$(ls -A ${NEMO_FLOW_CI_WORKSPACE_TMP}/wheels/*.whl 2>/dev/null)" ]; then
        echo "Error: No wheels found in ${NEMO_FLOW_CI_WORKSPACE_TMP}/wheels/"
        exit 1
      fi
    - echo "Uploading wheel to GitLab package registry"
    - |
      set -e
      UV_PUBLISH_USERNAME=gitlab-ci-token \
      UV_PUBLISH_PASSWORD="${CI_JOB_TOKEN}" \
      UV_PUBLISH_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi" \
      uv publish --no-progress ${NEMO_FLOW_CI_WORKSPACE_TMP}/wheels/*.whl
  after_script:
    - uv cache prune --ci


publish:artifactory:wheel:
  stage: publish
  image:
    name: ghcr.io/astral-sh/uv:${NEMO_FLOW_CI_UV_VERSION}-${NEMO_FLOW_CI_DEBIAN_VERSION}-slim
    pull_policy: if-not-present
  needs:
    - job: package:wheel:x86_64
      artifacts: true
  script:
    - |
      if [[ -z "${NEMO_FLOW_CI_ARTIFACTORY_USER}" || -z "${NEMO_FLOW_CI_ARTIFACTORY_KEY}" || -z "${NEMO_FLOW_CI_ARTIFACTORY_PYPI_URL}" ]]; then
        echo "Error: uploading to artifactory requires the following environment variables: NEMO_FLOW_CI_ARTIFACTORY_USER, NEMO_FLOW_CI_ARTIFACTORY_KEY, NEMO_FLOW_CI_ARTIFACTORY_PYPI_URL."
        exit 1
      fi

      echo "Uploading wheels to Artifactory"
      UV_PUBLISH_USERNAME="${NEMO_FLOW_CI_ARTIFACTORY_USER}" \
        UV_PUBLISH_PASSWORD="${NEMO_FLOW_CI_ARTIFACTORY_KEY}" \
        UV_PUBLISH_URL="${NEMO_FLOW_CI_ARTIFACTORY_PYPI_URL}" \
        uv publish --no-progress ${NEMO_FLOW_CI_WORKSPACE_TMP}/wheels/*.whl
      RETURN_CODE=$?
      if [ $RETURN_CODE -ne 0 ]; then
        echo "Error: Failed to publish wheels to Artifactory"
        exit $RETURN_CODE
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == 'main'

publish:artifactory:npm:
  stage: publish
  image:
    name: node:${NEMO_FLOW_CI_NODE_VERSION}-${NEMO_FLOW_CI_DEBIAN_VERSION}
    pull_policy: if-not-present
  needs:
    - job: package:nodejs:x86_64
      artifacts: true
    - job: package:wasm:bundler
      artifacts: true
  script:
    - |
      if [[ -z "${NEMO_FLOW_CI_ARTIFACTORY_USER}" || -z "${NEMO_FLOW_CI_ARTIFACTORY_KEY}" || -z "${NEMO_FLOW_CI_ARTIFACTORY_NPM_URL}" ]]; then
        echo "Error: uploading to artifactory requires the following environment variables: NEMO_FLOW_CI_ARTIFACTORY_USER, NEMO_FLOW_CI_ARTIFACTORY_KEY, NEMO_FLOW_CI_ARTIFACTORY_NPM_URL."
        exit 1
      fi
      echo "Uploading npm packages to Artifactory"
      REGISTRY_URL="${NEMO_FLOW_CI_ARTIFACTORY_NPM_URL%/}/"
      REGISTRY_KEY="${REGISTRY_URL#https:}"
      NPM_AUTH=$(printf '%s:%s' "${NEMO_FLOW_CI_ARTIFACTORY_USER}" "${NEMO_FLOW_CI_ARTIFACTORY_KEY}" | base64 | tr -d '\n')
      npm config set "@nvidia:registry" "${REGISTRY_URL}"
      npm config set "${REGISTRY_KEY}:_auth" "${NPM_AUTH}"
      npm config set "${REGISTRY_KEY}:email" "ci@nvidia.com"
      if [ -z "${CI_COMMIT_TAG}" ]; then
        NPM_PUBLISH_ARGS="--tag dev"
      else
        NPM_PUBLISH_ARGS=""
      fi
      RETURN_CODE=0
      for pkg in $(ls ${NEMO_FLOW_CI_WORKSPACE_TMP}/npm/*.tgz ${NEMO_FLOW_CI_WORKSPACE_TMP}/wasm/*.tgz 2>/dev/null); do
        filename=$(basename "$pkg")
        echo "Uploading ${filename} to Artifactory"
        npm publish ${NPM_PUBLISH_ARGS} "$pkg"
        RC=$?
        if [ $RC -ne 0 ]; then
          echo "Error: Failed to publish ${filename} to Artifactory"
          RETURN_CODE=1
        fi
      done
      if [ $RETURN_CODE -ne 0 ]; then
        echo "Error: One or more npm packages failed to publish to Artifactory"
        exit $RETURN_CODE
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == 'main'
