name: CI Pipeline
run-name: CI Pipeline

on:
  workflow_call:
    inputs:
      pr_info:
        description: 'The JSON string containing the PR information'
        required: true
        type: string
      base_sha:
        description: 'The base SHA of the PR'
        required: true
        type: string

# We only support ubuntu, so bash is the default
defaults:
  run:
    shell: bash

env:
  BASE_SHA: "${{ inputs.base_sha }}"
  GH_TOKEN: "${{ github.token }}"
  GIT_COMMIT: "${{ github.sha }}"
  NEXUS_CI_GO_VERSION: "1.26.1"
  NEXUS_CI_DEBIAN_VERSION: "trixie"
  NEXUS_CI_DEFAULT_PYTHON_VER: "3.11"  # The lowest supported Python version.
  NEXUS_CI_RUST_VERSION: "1.94.0"
  NEXUS_CI_NODE_VERSION: "24"
  NEXUS_CI_NVM_VERSION: "0.40.4"
  NEXUS_CI_UV_VERSION: "0.9.28"
  NEXUS_CI_WASM_VERSION: "0.2.20"
  NEXUS_CI_RUST_ONLY_EXCLUDES: "--exclude nvidia-nat-nexus-node --exclude nvidia-nat-nexus-python --exclude nat-nexus-wasm"
  NEXUS_CI_WORKSPACE: "${{ github.workspace }}/nexus"
  NEXUS_CI_WORKSPACE_TMP: "${{ github.workspace }}/tmp"
  UV_CACHE_DIR: .uv-cache
  UV_INSTALL_DIR: /usr/local/bin
  UV_PYTHON_DOWNLOADS: never

permissions:
  actions: none
  checks: none
  contents: read
  deployments: none
  discussions: none
  id-token: write
  issues: none
  packages: read
  pages: none
  pull-requests: read
  repository-projects: none
  security-events: none
  statuses: none

jobs:
  check:
    name: Check
    runs-on: linux-amd64-cpu4
    timeout-minutes: 30
    strategy:
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: 'nexus'

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: ${{ env.NEXUS_CI_UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: nexus/uv.lock

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          # Version or version range of Go to use
          go-version: ${{ env.NEXUS_CI_GO_VERSION }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.NEXUS_CI_DEFAULT_PYTHON_VER }}

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          toolchain: ${{ env.NEXUS_CI_RUST_VERSION }}
          components: clippy, rustfmt

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: pre-commit
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}
        run: |
          uv tool install pre-commit==4.5
          pre-commit run --all-files --show-diff-on-failure

  build:
    name: Build (${{ matrix.arch }})
    needs: [check]
    runs-on: linux-${{ matrix.arch }}-cpu4
    timeout-minutes: 60
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: 'nexus'

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          toolchain: ${{ env.NEXUS_CI_RUST_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NEXUS_CI_NODE_VERSION }}

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: ${{ env.NEXUS_CI_UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: nexus/uv.lock

      - name: Install build-essential
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends build-essential

      - name: Build Nexus (Rust)
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}
        run: |
          set -e

          echo "Install managed Python"
          UV_PYTHON_DOWNLOADS=manual uv python install --managed-python ${{ env.NEXUS_CI_DEFAULT_PYTHON_VER }}
          export PYO3_PYTHON="$(uv python find --managed-python ${{ env.NEXUS_CI_DEFAULT_PYTHON_VER }})"

          echo "Building Rust workspace"
          cargo build --release --workspace
          cargo test --no-run --release --workspace ${{ env.NEXUS_CI_RUST_ONLY_EXCLUDES }}

          echo "Build Node.js package"
          pushd ${{ env.NEXUS_CI_WORKSPACE }}/crates/node
          npm install
          npm run build
          popd

          echo "Build Python extension"
          mkdir -p ${{ env.NEXUS_CI_WORKSPACE_TMP }}
          uv venv --python=${{ env.NEXUS_CI_DEFAULT_PYTHON_VER }} --seed ${{ env.NEXUS_CI_WORKSPACE_TMP }}/.venv
          source ${{ env.NEXUS_CI_WORKSPACE_TMP }}/.venv/bin/activate
          uv sync --active --reinstall-package nvidia-nat-nexus

          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "Build WASM package"
            cargo install wasm-pack
            wasm-pack build --release crates/wasm --scope nvidia
          fi

      - name: Upload FFI shared libraries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ffi-libs-${{ matrix.arch }}
          path: ${{ env.NEXUS_CI_WORKSPACE }}/target/release/lib*.so
          if-no-files-found: error

      - name: Upload Node.js addon
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: node-addon-${{ matrix.arch }}
          path: |
            ${{ env.NEXUS_CI_WORKSPACE }}/crates/node/*.node
            ${{ env.NEXUS_CI_WORKSPACE }}/crates/node/index.js
            ${{ env.NEXUS_CI_WORKSPACE }}/crates/node/index.d.ts
          if-no-files-found: error

      - name: Upload WASM package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: matrix.arch == 'amd64'
        with:
          name: wasm-pkg
          path: ${{ env.NEXUS_CI_WORKSPACE }}/crates/wasm/pkg/
          if-no-files-found: error

      - name: Prune uv cache
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}
        run: uv cache prune --ci

  test-go:
    name: Test / Go (${{ matrix.arch }})
    needs: [build]
    runs-on: linux-${{ matrix.arch }}-cpu4
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, arm64]

    env:
      CGO_LDFLAGS: "-L${{ github.workspace }}/nexus/target/release"
      LD_LIBRARY_PATH: "${{ github.workspace }}/nexus/target/release"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: 'nexus'

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.NEXUS_CI_GO_VERSION }}

      - name: Download FFI shared libraries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ffi-libs-${{ matrix.arch }}
          path: ${{ env.NEXUS_CI_WORKSPACE }}/target/release/

      - name: Run Go tests
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}/go/nat_nexus
        run: |
          echo "Go version:"
          go version
          echo "Installing Go test reporting tools"
          go install github.com/jstemmer/go-junit-report/v2@latest
          go install github.com/boumenot/gocover-cobertura@latest
          echo "Running Go tests"
          mkdir -p ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage
          go test -v -coverprofile=coverage.out ./... 2>&1 \
            | tee /dev/stderr \
            | go-junit-report -set-exit-code > ${{ env.NEXUS_CI_WORKSPACE }}/go_junit_report.xml
          gocover-cobertura < coverage.out > ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/go_coverage_report.xml

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-go-${{ matrix.arch }}
          path: |
            ${{ env.NEXUS_CI_WORKSPACE }}/go_junit_report.xml
            ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/go_coverage_report.xml
          if-no-files-found: warn

  test-node:
    name: Test / Node.js (${{ matrix.arch }})
    needs: [build]
    runs-on: linux-${{ matrix.arch }}-cpu4
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: 'nexus'

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          toolchain: ${{ env.NEXUS_CI_RUST_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NEXUS_CI_NODE_VERSION }}

      - name: Install build-essential
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends build-essential

      - name: Run Node.js tests with coverage
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}
        run: |
          echo "Install cargo-llvm-cov"
          cargo install cargo-llvm-cov --locked

          mkdir -p target/coverage
          eval "$(cargo llvm-cov show-env --sh)"
          cargo llvm-cov clean --workspace
          cargo test -p nvidia-nat-nexus-node --lib
          pushd crates/node
          npm install
          npm install -g c8
          npm run build-debug
          c8 --reporter=cobertura --reporter=json-summary \
            --reports-dir="${{ env.NEXUS_CI_WORKSPACE }}/target/coverage" \
            node --test \
              --test-force-exit \
              --test-reporter=spec --test-reporter-destination=stdout \
              --test-reporter=junit \
              --test-reporter-destination="${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/nodejs_junit.xml" \
              tests/*.mjs
          popd
          cargo llvm-cov report -p nvidia-nat-nexus-node \
            --ignore-filename-regex '.*/src/.*_tests\.rs$' \
            --cobertura \
            --output-path target/coverage/node-rust.xml

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-node-${{ matrix.arch }}
          path: |
            ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/nodejs_junit.xml
            ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/cobertura-coverage.xml
            ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/coverage-summary.json
            ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/node-rust.xml
          if-no-files-found: warn

  test-python:
    name: Test / Python (${{ matrix.arch }})
    needs: [build]
    runs-on: linux-${{ matrix.arch }}-cpu4
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: 'nexus'

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          toolchain: ${{ env.NEXUS_CI_RUST_VERSION }}

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: ${{ env.NEXUS_CI_UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: nexus/uv.lock

      - name: Install build-essential
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends build-essential

      - name: Run Python tests with coverage
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}
        run: |
          set -e

          echo "Install managed Python"
          UV_PYTHON_DOWNLOADS=manual uv python install --managed-python ${{ env.NEXUS_CI_DEFAULT_PYTHON_VER }}
          export PYO3_PYTHON="$(uv python find --managed-python ${{ env.NEXUS_CI_DEFAULT_PYTHON_VER }})"
          export LD_LIBRARY_PATH="$("$PYO3_PYTHON" -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))')${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"

          cargo install cargo-llvm-cov --locked
          mkdir -p target/coverage
          eval "$(cargo llvm-cov show-env --sh)"
          cargo llvm-cov clean --workspace
          cargo test -p nvidia-nat-nexus-python --lib
          mkdir -p ${{ env.NEXUS_CI_WORKSPACE_TMP }}
          uv venv --python=${{ env.NEXUS_CI_DEFAULT_PYTHON_VER }} --seed ${{ env.NEXUS_CI_WORKSPACE_TMP }}/.venv
          source ${{ env.NEXUS_CI_WORKSPACE_TMP }}/.venv/bin/activate
          uv sync --active --reinstall-package nvidia-nat-nexus
          uv run maturin develop
          uv run pytest python/tests \
            --cov=nat_nexus --cov-report term-missing \
            --junit-xml=${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/pytest_junit_report.xml \
            --cov-report xml:${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/pytest_coverage_report.xml
          cargo llvm-cov report -p nvidia-nat-nexus-python \
            --ignore-filename-regex '.*/src/.*_tests\.rs$' \
            --cobertura \
            --output-path target/coverage/python-rust.xml

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-python-${{ matrix.arch }}
          path: |
            ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/pytest_junit_report.xml
            ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/pytest_coverage_report.xml
            ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/python-rust.xml
          if-no-files-found: warn

      - name: Prune uv cache
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}
        run: uv cache prune --ci

  test-rust:
    name: Test / Rust (${{ matrix.arch }})
    needs: [build]
    runs-on: linux-${{ matrix.arch }}-cpu4
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: 'nexus'

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          toolchain: ${{ env.NEXUS_CI_RUST_VERSION }}

      - name: Install build-essential
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends build-essential

      - name: Run Rust tests with coverage
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}
        run: |
          cargo install cargo-nextest --locked
          cargo install cargo-llvm-cov --locked
          mkdir -p target/coverage
          eval "$(cargo llvm-cov show-env --sh)"
          cargo llvm-cov clean --workspace
          cargo nextest run \
            --workspace \
            ${{ env.NEXUS_CI_RUST_ONLY_EXCLUDES }} \
            --release \
            --profile ci
          cargo llvm-cov report \
            --release \
            --ignore-filename-regex '(.*/crates/(node|python|wasm)/.*|.*/src/(coverage_tests|.*_tests)\.rs$)' \
            --cobertura \
            --output-path target/coverage/rust-workspace.xml

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-rust-${{ matrix.arch }}
          path: |
            ${{ env.NEXUS_CI_WORKSPACE }}/target/nextest/ci/rust_junit_report.xml
            ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/rust-workspace.xml
          if-no-files-found: warn

  test-wasm:
    name: Test / WASM (${{ matrix.arch }})
    needs: [build]
    runs-on: linux-${{ matrix.arch }}-cpu4
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: 'nexus'

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          toolchain: ${{ env.NEXUS_CI_RUST_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NEXUS_CI_NODE_VERSION }}

      - name: Run native WASM unit tests with Rust coverage
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}
        run: |
          cargo install wasm-pack
          cargo install cargo-llvm-cov --locked
          mkdir -p target/coverage
          (
            eval "$(cargo llvm-cov show-env --sh)"
            cargo llvm-cov clean --workspace
            cargo test -p nat-nexus-wasm --lib --release
            cargo llvm-cov report -p nat-nexus-wasm \
              --release \
              --ignore-filename-regex '.*/src/.*_tests\.rs$' \
              --cobertura \
              --output-path target/coverage/wasm-rust.xml
          )

          echo "Run WASM behavior tests"
          wasm-pack test --release --node crates/wasm

          echo "Build WASM Node package for JS coverage"
          wasm-pack build --release crates/wasm --target nodejs --out-dir pkg-test

          echo "Run WASM Node coverage harness"
          mkdir -p target/coverage
          npx --yes c8 \
            --include="crates/wasm/pkg-test/**/*.js" \
            --exclude="crates/wasm/tests-js/**" \
            --reporter=cobertura \
            --reports-dir="${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/wasm-c8" \
            node --test \
              --test-force-exit \
              --test-reporter=spec --test-reporter-destination=stdout \
              --test-reporter=junit \
              --test-reporter-destination="${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/wasm_junit.xml" \
              crates/wasm/tests-js/*.mjs
          mv ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/wasm-c8/cobertura-coverage.xml \
            ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/wasm-js.xml

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-wasm-${{ matrix.arch }}
          path: |
            ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/wasm_junit.xml
            ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/wasm-rust.xml
            ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/wasm-js.xml
          if-no-files-found: warn

  coverage-aggregate:
    name: Coverage / Aggregate
    needs: [test-go, test-node, test-python, test-rust, test-wasm]
    runs-on: linux-amd64-cpu4
    if: "!contains(needs.*.result, 'cancelled')"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: 'nexus'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.NEXUS_CI_DEFAULT_PYTHON_VER }}

      - name: Download all coverage artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: coverage-*-amd64
          path: ${{ env.NEXUS_CI_WORKSPACE }}
          merge-multiple: true

      - name: Restore coverage directory structure
        # upload-artifact strips the longest common path prefix from each artifact.
        # Artifacts whose files all live under target/coverage/ lose that prefix and
        # land flat at $NEXUS_CI_WORKSPACE. Artifacts split across target/ subdirs
        # lose only the target/ prefix. Move everything to target/coverage/ so the
        # aggregate script finds all files in the expected location.
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}
        run: |
          mkdir -p target/coverage
          # coverage-node/python/wasm: files stripped of target/coverage/ prefix
          for f in coverage-summary.json node-rust.xml \
                   pytest_coverage_report.xml python-rust.xml \
                   wasm-js.xml wasm-rust.xml; do
            [ -f "$f" ] && mv "$f" "target/coverage/$f" || true
          done
          # coverage-rust: files stripped of target/ prefix → coverage/rust-workspace.xml
          [ -f "coverage/rust-workspace.xml" ] && \
            mv "coverage/rust-workspace.xml" "target/coverage/rust-workspace.xml" || true

      - name: Aggregate coverage
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}
        run: python3 scripts/aggregate_coverage.py target/coverage

      - name: Upload coverage summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-summary
          path: ${{ env.NEXUS_CI_WORKSPACE }}/target/coverage/project-coverage-summary.md
          if-no-files-found: warn

  package-nodejs:
    name: Package / Node.js (${{ matrix.arch }})
    needs: [build]
    runs-on: linux-${{ matrix.arch }}-cpu4
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: 'nexus'

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NEXUS_CI_NODE_VERSION }}

      - name: Download Node.js addon
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: node-addon-${{ matrix.arch }}
          path: ${{ env.NEXUS_CI_WORKSPACE }}/crates/node/

      - name: Version and pack Node.js package
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}
        run: |
          set -e
          mkdir -p ${{ env.NEXUS_CI_WORKSPACE_TMP }}/npm
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "Non-release build: appending commit hash to version"
            node -e "
              try {
                const fs = require('fs');
                const sha = process.env.GITHUB_SHA.substring(0, 8);

                const pkgPath = 'crates/node/package.json';
                const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
                if (!pkg.version) {
                  console.error('Error: package.json missing version field');
                  process.exit(1);
                }
                pkg.version = pkg.version + '-' + sha;
                fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
                console.log('package.json version updated to ' + pkg.version);

                const lockPath = 'crates/node/package-lock.json';
                const lock = JSON.parse(fs.readFileSync(lockPath, 'utf8'));
                if (!lock.version) {
                  console.error('Error: package-lock.json missing version field');
                  process.exit(1);
                }
                lock.version = lock.version + '-' + sha;
                if (lock.packages && lock.packages['']) {
                  lock.packages[''].version = lock.packages[''].version + '-' + sha;
                }
                fs.writeFileSync(lockPath, JSON.stringify(lock, null, 2) + '\n');
                console.log('package-lock.json version updated to ' + lock.version);
              } catch (err) {
                console.error('Error updating version:', err);
                process.exit(1);
              }
            "
          else
            echo "Tagged release ${{ github.ref_name }}: using version as-is"
          fi
          echo "Packing ${{ matrix.arch }} npm package"
          pushd crates/node
          npm pack --pack-destination ${{ env.NEXUS_CI_WORKSPACE_TMP }}/npm
          popd

      - name: Upload npm package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-${{ matrix.arch }}
          path: ${{ env.NEXUS_CI_WORKSPACE_TMP }}/npm/*.tgz
          if-no-files-found: error

  package-wasm:
    name: Package / WASM (bundler)
    needs: [build]
    runs-on: linux-amd64-cpu4
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: 'nexus'

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NEXUS_CI_NODE_VERSION }}

      - name: Download WASM package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: wasm-pkg
          path: ${{ env.NEXUS_CI_WORKSPACE }}/crates/wasm/pkg/

      - name: Version and pack WASM package
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}
        run: |
          set -e
          mkdir -p ${{ env.NEXUS_CI_WORKSPACE_TMP }}/wasm
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "Non-release build: appending commit hash to version"
            node -e "
              try {
                const fs = require('fs');
                const sha = process.env.GITHUB_SHA.substring(0, 8);

                const pkgPath = 'crates/wasm/pkg/package.json';
                const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
                if (!pkg.version) {
                  console.error('Error: package.json missing version field');
                  process.exit(1);
                }
                pkg.version = pkg.version + '-' + sha;
                fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
                console.log('crates/wasm/pkg/package.json version updated to ' + pkg.version);
              } catch (err) {
                console.error('Error updating version:', err);
                process.exit(1);
              }
            "
          else
            echo "Tagged release ${{ github.ref_name }}: using version as-is"
          fi
          echo "Packing WASM bundler package"
          pushd crates/wasm/pkg
          npm pack --pack-destination ${{ env.NEXUS_CI_WORKSPACE_TMP }}/wasm
          popd

      - name: Upload WASM package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wasm-bundler
          path: ${{ env.NEXUS_CI_WORKSPACE_TMP }}/wasm/*.tgz
          if-no-files-found: error

  package-wheel:
    name: Package / Python Wheel (${{ matrix.arch }})
    needs: [build]
    runs-on: linux-${{ matrix.arch }}-cpu4
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: 'nexus'

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          toolchain: ${{ env.NEXUS_CI_RUST_VERSION }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.NEXUS_CI_DEFAULT_PYTHON_VER }}

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: ${{ env.NEXUS_CI_UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: nexus/uv.lock

      - name: Install build-essential
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends build-essential

      - name: Build Python wheel
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}
        run: |
          mkdir -p ${{ env.NEXUS_CI_WORKSPACE_TMP }}
          uv venv --python=${{ env.NEXUS_CI_DEFAULT_PYTHON_VER }} --seed ${{ env.NEXUS_CI_WORKSPACE_TMP }}/.venv
          source ${{ env.NEXUS_CI_WORKSPACE_TMP }}/.venv/bin/activate
          uv sync --active --reinstall-package nvidia-nat-nexus
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "Non-release build: appending commit hash to version"
            if ! sed -i "s/^version = \"\(.*\)\"/version = \"\1+${GITHUB_SHA::8}\"/" Cargo.toml; then
              echo "Error: Failed to modify version in Cargo.toml"
              exit 1
            fi
            if ! grep -q "version = \".*+${GITHUB_SHA::8}\"" Cargo.toml; then
              echo "Error: Version modification did not apply correctly"
              exit 1
            fi
          else
            echo "Tagged release ${{ github.ref_name }}: using version as-is"
          fi
          echo "Building ${{ matrix.arch }} wheel"
          maturin build --release \
            --target ${{ matrix.arch == 'amd64' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu' }} \
            --out ${{ env.NEXUS_CI_WORKSPACE_TMP }}/wheels
          if [ ! -d ${{ env.NEXUS_CI_WORKSPACE_TMP }}/wheels ] || \
             [ -z "$(ls -A ${{ env.NEXUS_CI_WORKSPACE_TMP }}/wheels/*.whl 2>/dev/null)" ]; then
            echo "Error: No wheels found in ${{ env.NEXUS_CI_WORKSPACE_TMP }}/wheels/"
            exit 1
          fi

      - name: Upload wheel artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheel-${{ matrix.arch }}
          path: ${{ env.NEXUS_CI_WORKSPACE_TMP }}/wheels/*.whl
          if-no-files-found: error

      - name: Prune uv cache
        working-directory: ${{ env.NEXUS_CI_WORKSPACE }}
        run: uv cache prune --ci
