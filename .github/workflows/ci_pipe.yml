name: CI Pipeline
run-name: CI Pipeline

on:
  workflow_call:
    inputs:
      pr_info:
        description: 'The JSON string containing the PR information'
        required: true
        type: string
      base_sha:
        description: 'The base SHA of the PR'
        required: true
        type: string
      before_sha:
        description: 'The previous SHA from the triggering push event'
        required: true
        type: string
      ref_type:
        description: 'The ref type from the triggering workflow'
        required: true
        type: string
      ref_name:
        description: 'The ref name from the triggering workflow'
        required: true
        type: string

defaults:
  run:
    shell: bash

env:
  GH_TOKEN: "${{ github.token }}"
  GIT_COMMIT: "${{ github.sha }}"
  NEMO_FLOW_CI_GO_VERSION: "1.26.1"
  NEMO_FLOW_CI_DEFAULT_PYTHON_VER: "3.11"
  NEMO_FLOW_CI_RUST_VERSION: "1.94.0"
  NEMO_FLOW_CI_NODE_VERSION: "24"
  NEMO_FLOW_CI_UV_VERSION: "0.9.28"
  NEMO_FLOW_CI_WORKSPACE: "${{ github.workspace }}/NeMo-Flow"
  NEMO_FLOW_CI_WORKSPACE_TMP: "${{ github.workspace }}/tmp"
  UV_CACHE_DIR: .uv-cache
  UV_INSTALL_DIR: /usr/local/bin
  UV_PYTHON_DOWNLOADS: never

permissions:
  actions: none
  checks: none
  contents: read
  deployments: none
  discussions: none
  id-token: write
  issues: none
  packages: read
  pages: none
  pull-requests: read
  repository-projects: none
  security-events: none
  statuses: none

jobs:
  changes:
    name: Changes
    runs-on: linux-amd64-cpu4
    outputs:
      run_all: ${{ steps.classify.outputs.run_all }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
      run_python: ${{ steps.classify.outputs.run_python }}
      run_go: ${{ steps.classify.outputs.run_go }}
      run_node: ${{ steps.classify.outputs.run_node }}
      run_wasm: ${{ steps.classify.outputs.run_wasm }}
      run_rust: ${{ steps.classify.outputs.run_rust }}
      run_check: ${{ steps.classify.outputs.run_check }}
      run_packages: ${{ steps.classify.outputs.run_packages }}
      run_coverage_aggregate: ${{ steps.classify.outputs.run_coverage_aggregate }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          path: 'NeMo-Flow'

      - name: Classify changed files
        id: classify
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: |
          bash scripts/classify_ci_changes.sh \
            "${{ inputs.base_sha }}" \
            "${{ inputs.before_sha }}" \
            "${{ github.sha }}" \
            "${{ inputs.ref_type }}"

  check:
    name: Check
    needs: [changes]
    if: ${{ needs.changes.outputs.run_check == 'true' }}
    runs-on: linux-amd64-cpu4
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: 'NeMo-Flow'

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          version: ${{ env.NEMO_FLOW_CI_UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: NeMo-Flow/uv.lock

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.NEMO_FLOW_CI_GO_VERSION }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.NEMO_FLOW_CI_DEFAULT_PYTHON_VER }}

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          toolchain: ${{ env.NEMO_FLOW_CI_RUST_VERSION }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          shared-key: nemo-flow-rust-${{ runner.os }}-${{ runner.arch }}-${{ env.NEMO_FLOW_CI_RUST_VERSION }}
          workspaces: NeMo-Flow -> target

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: pre-commit
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: |
          uv tool install pre-commit==4.5
          pre-commit run --all-files --show-diff-on-failure

  ci-platform:
    name: CI / ${{ matrix.platform }}
    needs: [changes, check]
    if: ${{ needs.changes.outputs.run_check == 'true' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: linux-amd64-cpu4
            wheel_target: x86_64-unknown-linux-gnu
          - platform: linux-arm64
            runner: linux-arm64-cpu4
            wheel_target: aarch64-unknown-linux-gnu
          - platform: macos-arm64
            runner: macos-15
            wheel_target: aarch64-apple-darwin

    env:
      CGO_LDFLAGS: "-L${{ github.workspace }}/NeMo-Flow/target/release"
      LD_LIBRARY_PATH: "${{ github.workspace }}/NeMo-Flow/target/release"
      DYLD_LIBRARY_PATH: "${{ github.workspace }}/NeMo-Flow/target/release"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: 'NeMo-Flow'

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          toolchain: ${{ env.NEMO_FLOW_CI_RUST_VERSION }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          shared-key: nemo-flow-rust-${{ runner.os }}-${{ runner.arch }}-${{ env.NEMO_FLOW_CI_RUST_VERSION }}
          workspaces: NeMo-Flow -> target

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        if: ${{ needs.changes.outputs.run_go == 'true' }}
        with:
          go-version: ${{ env.NEMO_FLOW_CI_GO_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        if: ${{ needs.changes.outputs.run_node == 'true' || needs.changes.outputs.run_wasm == 'true' || needs.changes.outputs.run_packages == 'true' }}
        with:
          node-version: ${{ env.NEMO_FLOW_CI_NODE_VERSION }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        if: ${{ needs.changes.outputs.run_python == 'true' || needs.changes.outputs.run_packages == 'true' }}
        with:
          python-version: ${{ env.NEMO_FLOW_CI_DEFAULT_PYTHON_VER }}

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        if: ${{ needs.changes.outputs.run_python == 'true' || needs.changes.outputs.run_packages == 'true' }}
        with:
          version: ${{ env.NEMO_FLOW_CI_UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: NeMo-Flow/uv.lock

      - name: Install build-essential
        if: ${{ runner.os == 'Linux' }}
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends build-essential

      - name: Install Rust CI tools
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: |
          cargo install cargo-nextest --locked
          cargo install cargo-llvm-cov --locked
          if [[ "${{ needs.changes.outputs.run_wasm }}" == "true" || "${{ needs.changes.outputs.run_packages }}" == "true" ]]; then
            cargo install wasm-pack
          fi

      - name: Prepare artifact directories
        run: |
          mkdir -p ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage
          mkdir -p ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/npm
          mkdir -p ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/wasm
          mkdir -p ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/wheels

      - name: Run Rust tests with coverage
        if: ${{ needs.changes.outputs.run_rust == 'true' }}
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: |
          eval "$(cargo llvm-cov show-env --sh)"
          cargo llvm-cov clean --workspace
          cargo nextest run \
            --workspace \
            --exclude nemo-flow-node \
            --exclude nemo-flow-python \
            --exclude nemo-flow-wasm \
            --release \
            --profile ci
          cargo llvm-cov report \
            --release \
            --ignore-filename-regex '(.*/crates/(node|python|wasm)/.*|.*/src/(coverage_tests|.*_tests)\.rs$)' \
            --cobertura \
            --output-path ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/rust-workspace.xml
          [ -f target/nextest/ci/rust_junit_report.xml ] && \
            cp target/nextest/ci/rust_junit_report.xml ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/rust_junit_report.xml || true

      - name: Run Go tests with coverage
        if: ${{ needs.changes.outputs.run_go == 'true' }}
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: |
          set -e

          cargo build --release -p nemo-flow-ffi

          pushd go/nemo_flow
          echo "Go version:"
          go version
          echo "Installing Go test reporting tools"
          go install github.com/jstemmer/go-junit-report/v2@latest
          go install github.com/boumenot/gocover-cobertura@latest
          echo "Running Go tests"
          go test -v -coverprofile=coverage.out ./... 2>&1 \
            | tee /dev/stderr \
            | go-junit-report -set-exit-code > ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/go_junit_report.xml
          gocover-cobertura < coverage.out > ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/go_coverage_report.xml
          popd

      - name: Run Node.js tests with coverage
        if: ${{ needs.changes.outputs.run_node == 'true' }}
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: |
          eval "$(cargo llvm-cov show-env --sh)"
          cargo llvm-cov clean --workspace
          cargo test -p nemo-flow-node --lib
          pushd crates/node
          npm install
          npm install -g c8
          npm run build-debug
          c8 --reporter=cobertura --reporter=json-summary \
            --reports-dir="${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage" \
            node --test \
              --test-force-exit \
              --test-reporter=spec --test-reporter-destination=stdout \
              --test-reporter=junit \
              --test-reporter-destination="${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/nodejs_junit.xml" \
              tests/*.mjs
          popd
          cargo llvm-cov report -p nemo-flow-node \
            --ignore-filename-regex '.*/src/.*_tests\.rs$' \
            --cobertura \
            --output-path ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/node-rust.xml

      - name: Run Python tests with coverage
        if: ${{ needs.changes.outputs.run_python == 'true' }}
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: |
          set -e

          echo "Install managed Python"
          UV_PYTHON_DOWNLOADS=manual uv python install --managed-python ${{ env.NEMO_FLOW_CI_DEFAULT_PYTHON_VER }}
          export PYO3_PYTHON="$(uv python find --managed-python ${{ env.NEMO_FLOW_CI_DEFAULT_PYTHON_VER }})"

          PYTHON_LIBDIR="$("$PYO3_PYTHON" -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR") or "")')"
          if [ -n "$PYTHON_LIBDIR" ]; then
            export LD_LIBRARY_PATH="${PYTHON_LIBDIR}${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
            export DYLD_LIBRARY_PATH="${PYTHON_LIBDIR}${DYLD_LIBRARY_PATH:+:${DYLD_LIBRARY_PATH}}"
          fi

          eval "$(cargo llvm-cov show-env --sh)"
          cargo llvm-cov clean --workspace
          cargo test -p nemo-flow-python --lib
          mkdir -p ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}
          uv venv --python=${{ env.NEMO_FLOW_CI_DEFAULT_PYTHON_VER }} --seed ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/.venv
          source ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/.venv/bin/activate
          uv sync --active --reinstall-package nemo-flow
          uv run maturin develop
          uv run pytest python/tests \
            --cov=nemo_flow --cov-report term-missing \
            --junit-xml=${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/pytest_junit_report.xml \
            --cov-report xml:${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/pytest_coverage_report.xml
          cargo llvm-cov report -p nemo-flow-python \
            --ignore-filename-regex '.*/src/.*_tests\.rs$' \
            --cobertura \
            --output-path ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/python-rust.xml

      - name: Run WASM tests with coverage
        if: ${{ needs.changes.outputs.run_wasm == 'true' }}
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: |
          (
            eval "$(cargo llvm-cov show-env --sh)"
            cargo llvm-cov clean --workspace
            cargo test -p nemo-flow-wasm --lib --release
            cargo llvm-cov report -p nemo-flow-wasm \
              --release \
              --ignore-filename-regex '.*/src/.*_tests\.rs$' \
              --cobertura \
              --output-path ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/wasm-rust.xml
          )

          echo "Run WASM behavior tests"
          wasm-pack test --release --node crates/wasm

          echo "Build WASM Node package for JS coverage"
          wasm-pack build --release crates/wasm --target nodejs --out-dir pkg-test

          echo "Run WASM Node coverage harness"
          npx --yes c8 \
            --include="crates/wasm/pkg-test/**/*.js" \
            --exclude="crates/wasm/tests-js/**" \
            --reporter=cobertura \
            --reports-dir="${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/wasm-c8" \
            node --test \
              --test-force-exit \
              --test-reporter=spec --test-reporter-destination=stdout \
              --test-reporter=junit \
              --test-reporter-destination="${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/wasm_junit.xml" \
              crates/wasm/tests-js/*.mjs
          mv ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/wasm-c8/cobertura-coverage.xml \
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/wasm-js.xml

      - name: Package Node.js
        if: ${{ needs.changes.outputs.run_packages == 'true' }}
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: |
          set -e
          mkdir -p ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/npm
          if [ "${{ inputs.ref_type }}" != "tag" ]; then
            echo "Non-release build: appending commit hash to version"
            node -e "
              try {
                const fs = require('fs');
                const sha = process.env.GITHUB_SHA.substring(0, 8);

                const pkgPath = 'crates/node/package.json';
                const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
                if (!pkg.version) {
                  console.error('Error: package.json missing version field');
                  process.exit(1);
                }
                pkg.version = pkg.version + '-' + sha;
                fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
                console.log('package.json version updated to ' + pkg.version);

                const lockPath = 'crates/node/package-lock.json';
                const lock = JSON.parse(fs.readFileSync(lockPath, 'utf8'));
                if (!lock.version) {
                  console.error('Error: package-lock.json missing version field');
                  process.exit(1);
                }
                lock.version = lock.version + '-' + sha;
                if (lock.packages && lock.packages['']) {
                  lock.packages[''].version = lock.packages[''].version + '-' + sha;
                }
                fs.writeFileSync(lockPath, JSON.stringify(lock, null, 2) + '\n');
                console.log('package-lock.json version updated to ' + lock.version);
              } catch (err) {
                console.error('Error updating version:', err);
                process.exit(1);
              }
            "
          else
            echo "Tagged release ${{ inputs.ref_name }}: using version as-is"
          fi
          pushd crates/node
          if [ ! -d node_modules ]; then
            npm install
          fi
          npm run build
          npm pack --pack-destination ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/npm
          popd

      - name: Package WASM bundler
        if: ${{ needs.changes.outputs.run_packages == 'true' && matrix.platform == 'linux-amd64' }}
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: |
          set -e
          mkdir -p ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/wasm
          wasm-pack build --release crates/wasm --scope nvidia
          if [ "${{ inputs.ref_type }}" != "tag" ]; then
            echo "Non-release build: appending commit hash to version"
            node -e "
              try {
                const fs = require('fs');
                const sha = process.env.GITHUB_SHA.substring(0, 8);

                const pkgPath = 'crates/wasm/pkg/package.json';
                const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
                if (!pkg.version) {
                  console.error('Error: package.json missing version field');
                  process.exit(1);
                }
                pkg.version = pkg.version + '-' + sha;
                fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
                console.log('crates/wasm/pkg/package.json version updated to ' + pkg.version);
              } catch (err) {
                console.error('Error updating version:', err);
                process.exit(1);
              }
            "
          else
            echo "Tagged release ${{ inputs.ref_name }}: using version as-is"
          fi
          pushd crates/wasm/pkg
          npm pack --pack-destination ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/wasm
          popd

      - name: Package Python wheel
        if: ${{ needs.changes.outputs.run_packages == 'true' }}
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: |
          set -e
          mkdir -p ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}
          uv venv --clear --python=${{ env.NEMO_FLOW_CI_DEFAULT_PYTHON_VER }} --seed ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/.venv
          source ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/.venv/bin/activate
          uv sync --active --reinstall-package nemo-flow
          if [ "${{ inputs.ref_type }}" != "tag" ]; then
            echo "Non-release build: appending commit hash to version"
            python -c 'from pathlib import Path; import os, re, sys; path = Path("Cargo.toml"); text = path.read_text(); sha = os.environ["GITHUB_SHA"][:8]; updated, count = re.subn(r"^version = \"(.*)\"$", f"version = \"\\1+{sha}\"", text, count=1, flags=re.MULTILINE); count == 1 or sys.exit("Failed to update version in Cargo.toml"); path.write_text(updated)'
          else
            echo "Tagged release ${{ inputs.ref_name }}: using version as-is"
          fi
          maturin build --release \
            --target ${{ matrix.wheel_target }} \
            --out ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/wheels
          if [ ! -d ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/wheels ] || \
             [ -z "$(ls -A ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/wheels/*.whl 2>/dev/null)" ]; then
            echo "Error: No wheels found in ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/wheels/"
            exit 1
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ always() }}
        with:
          name: coverage-${{ matrix.platform }}
          path: |
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/go_junit_report.xml
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/go_coverage_report.xml
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/nodejs_junit.xml
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/cobertura-coverage.xml
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/coverage-summary.json
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/node-rust.xml
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/pytest_junit_report.xml
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/pytest_coverage_report.xml
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/python-rust.xml
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/rust_junit_report.xml
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/rust-workspace.xml
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/wasm_junit.xml
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/wasm-rust.xml
            ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/coverage/wasm-js.xml
          if-no-files-found: warn

      - name: Upload npm package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ needs.changes.outputs.run_packages == 'true' }}
        with:
          name: npm-${{ matrix.platform }}
          path: ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/npm/*.tgz
          if-no-files-found: error

      - name: Upload wheel artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ needs.changes.outputs.run_packages == 'true' }}
        with:
          name: wheel-${{ matrix.platform }}
          path: ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/wheels/*.whl
          if-no-files-found: error

      - name: Upload WASM package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ needs.changes.outputs.run_packages == 'true' && matrix.platform == 'linux-amd64' }}
        with:
          name: wasm-bundler
          path: ${{ env.NEMO_FLOW_CI_WORKSPACE_TMP }}/wasm/*.tgz
          if-no-files-found: error

      - name: Prune uv cache
        if: ${{ needs.changes.outputs.run_python == 'true' || needs.changes.outputs.run_packages == 'true' }}
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: uv cache prune --ci

  coverage-aggregate:
    name: Coverage / Aggregate
    needs: [changes, ci-platform]
    runs-on: linux-amd64-cpu4
    if: ${{ always() && needs.changes.outputs.run_coverage_aggregate == 'true' && needs.ci-platform.result != 'cancelled' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: 'NeMo-Flow'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.NEMO_FLOW_CI_DEFAULT_PYTHON_VER }}

      - name: Download canonical Linux coverage artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-linux-amd64
          path: ${{ env.NEMO_FLOW_CI_WORKSPACE }}

      - name: Restore coverage directory structure
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: |
          mkdir -p target/coverage
          for f in go_coverage_report.xml \
                   go_junit_report.xml \
                   nodejs_junit.xml \
                   cobertura-coverage.xml \
                   coverage-summary.json \
                   node-rust.xml \
                   pytest_junit_report.xml \
                   pytest_coverage_report.xml \
                   python-rust.xml \
                   rust_junit_report.xml \
                   rust-workspace.xml \
                   wasm_junit.xml \
                   wasm-js.xml \
                   wasm-rust.xml; do
            [ -f "$f" ] && mv "$f" "target/coverage/$f" || true
          done

      - name: Aggregate coverage
        working-directory: ${{ env.NEMO_FLOW_CI_WORKSPACE }}
        run: python3 scripts/aggregate_coverage.py target/coverage

      - name: Upload coverage summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-summary
          path: ${{ env.NEMO_FLOW_CI_WORKSPACE }}/target/coverage/project-coverage-summary.md
          if-no-files-found: warn
