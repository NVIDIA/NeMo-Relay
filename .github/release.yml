changelog:
  exclude:
    authors:
      - octocat
      - dependabot[bot]
      - dependabot-preview[bot]
      - GPUtester
  categories:
    - title: 💥 Breaking Changes
      labels:
        - breaking
    - title: ✨ New Features
      labels:
        - Feature
    - title: ⚡ Improvements
      labels:
        - Improvement
    - title: 🐛 Bug Fixes
      labels:
        - Bug
    - title: ✅ Tests
      labels:
        - Test
    - title: 🤖 Automation
      labels:
        - Automation
    - title: 🧰 Maintenance
      labels:
        - Maintenance
    - title: 📝 Documentation Updates
      labels:
        - Documentation
    - title: Other Changes
      labels:
        - "*"
