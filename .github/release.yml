changelog:
  exclude:
    authors:
      - octocat
      - dependabot[bot]
      - dependabot-preview[bot]
  categories:
    - title: 🚨 Breaking Changes
      labels:
        - breaking
    - title: ✨ New Features
      labels:
        - "feature request"
    - title: 🔧 Improvements
      labels:
        - "improvement"
    - title: 🐛 Bug Fixes
      labels:
        - bug
    - title: 📝 Documentation Updates
      labels:
        - doc
    - title: Other Changes
      labels:
        - "*"
