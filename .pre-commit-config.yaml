repos:
  # SPDX copyright header check
  - repo: local
    hooks:
      - id: copyright-header
        name: copyright header
        entry: python3 scripts/check_copyright.py
        language: system
        files: '\.(rs|go|py|pyi|toml|yaml|yml|md|mjs|js|ts|h|sh)$|\.gitignore$'
        exclude: '(index\.js|index\.d\.ts|nemo_flow\.h|node_modules/|target/|\.venv/|pkg/)$'

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # Python — ruff lint + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Python — type checking
  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: uv run ty check . --exclude third_party/** --exclude ./examples/** --exclude .cache/** --exclude .claude/**
        language: system
        types: [python]
        pass_filenames: false

  # Rust — fmt + clippy + cargo-deny
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        entry: cargo check --workspace --all-targets
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-deny
        name: cargo deny
        entry: cargo deny check
        language: system
        files: '(Cargo\.toml|Cargo\.lock|deny\.toml)$'
        pass_filenames: false

  # Go — fmt + vet
  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: gofmt -l -w
        language: system
        types: [go]

      - id: go-vet
        name: go vet
        entry: bash -c 'cd go/nemo_flow && go vet ./...'
        language: system
        types: [go]
        pass_filenames: false
