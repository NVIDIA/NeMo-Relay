targets:
  claude-sonnet-4-6:
    model: azure/anthropic/claude-sonnet-4-6
    format: openai
    base_url: https://inference-api.nvidia.com/v1
    api_key: ${NV_INFERENCEHUB_KEY}
  claude-opus-4-6:
    model: azure/anthropic/claude-opus-4-6
    format: openai
    base_url: https://inference-api.nvidia.com/v1
    api_key: ${NV_INFERENCEHUB_KEY}

profiles:
  claude-4-6-stage-router:
    type: stage_router
    capable: claude-opus-4-6
    efficient: claude-sonnet-4-6
    fallback_target_on_evict: claude-opus-4-6
    picker: efficient_first
    # Exercise deterministic dimensions on organic tool results. The failing
    # invariant check clears this threshold toward capable; the clean check
    # returns to the efficient picker default.
    confidence_threshold: 0.05
    signal_recent_window: 8
