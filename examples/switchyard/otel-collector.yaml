receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

exporters:
  file/trajectory:
    path: /artifacts/trajectory.otel.json
  otlp/phoenix:
    endpoint: phoenix:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [file/trajectory, otlp/phoenix]
